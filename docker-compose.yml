version: '3.8'

services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: tripwise-db-local
    environment:
      POSTGRES_DB: tripwise
      POSTGRES_USER: tripwise_user
      POSTGRES_PASSWORD: tripwise_local_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata-local:/var/lib/postgresql/data
    networks:
      - tripwise-local-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tripwise_user -d tripwise"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: tripwise-cache-local
    ports:
      - "6379:6379"
    volumes:
      - redisdata-local:/data
    networks:
      - tripwise-local-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:8.4
    container_name: tripwise-pgadmin-local
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@tripwise.local
      PGADMIN_DEFAULT_PASSWORD: admin_local_password
    ports:
      - "5050:80"
    networks:
      - tripwise-local-network
    depends_on:
      postgres:
        condition: service_healthy

  minio:
    image: minio/minio:RELEASE.2024-02-17T01-15-57Z
    container_name: tripwise-storage-local
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minio_local_user
      MINIO_ROOT_PASSWORD: minio_local_password
    volumes:
      - miniodata-local:/data
    command: server /data --console-address ":9001"
    networks:
      - tripwise-local-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata-local:
    driver: local
  redisdata-local:
    driver: local
  miniodata-local:
    driver: local

networks:
  tripwise-local-network:
    driver: bridge
