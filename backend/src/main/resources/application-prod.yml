spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

tripwise:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:PT15M}

logging:
  level:
    root: INFO
    com.tripwise: INFO
