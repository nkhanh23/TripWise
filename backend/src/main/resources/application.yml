server:
  port: ${PORT:8080}
  servlet:
    context-path: /
  shutdown: graceful

spring:
  application:
    name: tripwise-backend
  lifecycle:
    timeout-per-shutdown-phase: 30s

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:10}
      minimum-idle: 2
      idle-timeout: 30000
      max-lifetime: 1800000
      keepalive-time: 300000
      connection-timeout: 20000
      validation-timeout: 5000

  jpa:
    open-in-view: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 50

  flyway:
    enabled: true
    baseline-on-migrate: true

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST}
      port: ${SPRING_DATA_REDIS_PORT}
      timeout: 500ms

# Monitoring & Health Check
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
  paths-to-match: /api/v1/**
  packages-to-scan: com.tripwise

# Logging Configuration
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} [X-Correlation-Id: %X{correlationId}] - %msg%n"
  level:
    root: INFO
    com.tripwise: ${LOG_LEVEL_TRIPWISE:INFO}

tripwise:
  jwt:
    access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:PT15M}
    refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:P7D}
  gemini:
    api-key: ${GEMINI_API_KEY:dummy-api-key-to-prevent-startup-failure}
    api-url: ${GEMINI_API_URL:https://generativelanguage.googleapis.com/v1beta}
    model: ${GEMINI_MODEL:gemini-1.5-flash}
    timeout: ${GEMINI_TIMEOUT:30s}
  osrm:
    api-url: ${OSRM_API_URL:https://router.project-osrm.org}
    timeout: ${OSRM_TIMEOUT:3s}
  weather:
    api-url: ${WEATHER_API_URL:https://api.open-meteo.com}
    timeout: ${WEATHER_TIMEOUT:3s}
  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:true}
    login:
      capacity: ${AUTH_LOGIN_RATE_LIMIT_CAPACITY:5}
      window: ${AUTH_LOGIN_RATE_LIMIT_WINDOW:PT1M}
    register:
      capacity: ${AUTH_REGISTER_RATE_LIMIT_CAPACITY:3}
      window: ${AUTH_REGISTER_RATE_LIMIT_WINDOW:PT1M}
    trip-generation:
      capacity: ${TRIP_GENERATION_RATE_LIMIT_CAPACITY:3}
      window: ${TRIP_GENERATION_RATE_LIMIT_WINDOW:PT1M}
  security:
    docs-public-enabled: ${TRIPWISE_DOCS_PUBLIC_ENABLED:false}
  scoring:
    weight:
      interest: ${TRIPWISE_SCORING_WEIGHT_INTEREST:4.0}
      budget: ${TRIPWISE_SCORING_WEIGHT_BUDGET:3.0}
      rating: ${TRIPWISE_SCORING_WEIGHT_RATING:2.0}
      distance: ${TRIPWISE_SCORING_WEIGHT_DISTANCE:1.0}
    distance:
      max-meters: ${TRIPWISE_SCORING_DISTANCE_MAX_METERS:15000.0}
  itinerary:
    places-per-day: ${TRIPWISE_ITINERARY_PLACES_PER_DAY:4}
